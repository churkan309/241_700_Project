<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการบทเรียน - Online Course</title>
    <link rel="stylesheet" href="../../../style.css">
    <style>
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            color: var(--text-2);
            font-size: var(--text-sm);
            text-decoration: none;
            margin-bottom: var(--space-6);
            transition: color var(--transition);
            background: none;
            border: none;
            cursor: pointer;
            font-family: var(--font-body);
            padding: 0;
        }

        .back-btn:hover {
            color: var(--accent);
        }

        .course-meta {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            margin-bottom: var(--space-2);
        }

        .lesson-list {
            display: flex;
            flex-direction: column;
        }

        .lesson-item {
            display: flex;
            align-items: center;
            gap: var(--space-4);
            padding: var(--space-4) var(--space-5);
            border-bottom: 1px solid var(--border);
            transition: background var(--transition);
            animation: rowIn .3s ease both;
        }

        .lesson-item:last-child {
            border-bottom: none;
        }

        .lesson-item:hover {
            background: var(--bg-hover);
        }

        .lesson-number {
            width: 32px;
            height: 32px;
            background: var(--accent-pale);
            border: 1px solid rgba(79, 140, 255, 0.2);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--text-xs);
            font-weight: 700;
            color: var(--accent);
            flex-shrink: 0;
        }

        .lesson-info {
            flex: 1;
            min-width: 0;
        }

        .lesson-title {
            font-weight: 600;
            color: var(--text-1);
            font-size: var(--text-sm);
            margin-bottom: 3px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .lesson-desc {
            font-size: var(--text-xs);
            color: var(--text-2);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .lesson-links {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            flex-shrink: 0;
        }

        .link-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px;
            border-radius: var(--radius-full);
            font-size: var(--text-xs);
            font-weight: 500;
            border: 1px solid var(--border);
            color: var(--text-3);
            text-decoration: none;
            transition: var(--transition);
        }

        .link-chip.has-link {
            color: var(--green);
            background: var(--green-muted);
            border-color: rgba(63, 185, 80, 0.3);
        }

        .link-chip.has-link:hover {
            filter: brightness(1.15);
            text-decoration: none;
        }

        .lesson-actions {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            flex-shrink: 0;
        }

        .form-section {
            background: var(--bg-inset);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: var(--space-4);
            margin-top: var(--space-2);
        }

        .form-section-title {
            font-size: var(--text-xs);
            font-weight: 600;
            color: var(--text-2);
            text-transform: uppercase;
            letter-spacing: .07em;
            margin-bottom: var(--space-4);
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }

        .input-with-icon {
            position: relative;
        }

        .input-with-icon .link-icon {
            position: absolute;
            left: 11px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-3);
            pointer-events: none;
            display: flex;
            align-items: center;
        }

        .input-with-icon .form-input {
            padding-left: 34px;
        }

        .link-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-4);
        }

        .btn-confirm-delete {
            flex: 1;
            background: var(--red);
            border: none;
            border-radius: var(--radius-sm);
            padding: 10px;
            color: #fff;
            font-family: var(--font-body);
            font-size: var(--text-sm);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-confirm-delete:hover {
            filter: brightness(1.1);
        }

        @media (max-width: 640px) {
            .lesson-links {
                display: none;
            }

            .link-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <header class="topbar">
        <a class="logo" href="#">
            <div class="logo-dot"></div>
            OnlineCourse
        </a>
        <div class="topbar-right">
            <button class="btn-profile" id="btnProfile">
                <div class="avatar avatar-sm" id="avatarInitial">TC</div>
                <span id="topbarName">อาจารย์</span>
            </button>
            <button class="btn-logout" id="btnLogout">ออกจากระบบ</button>
        </div>
    </header>

    <main class="main">

        <button class="back-btn" id="btnBack">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
            กลับแดชบอร์ด
        </button>

        <div class="page-header anim-1">
            <div class="course-meta">
                <span class="badge badge-blue" id="courseIdBadge">Course ID: –</span>
            </div>
            <h1 class="page-title" id="pageTitle">กำลังโหลด...</h1>
            <p class="page-subtitle" id="pageSubtitle">กำลังโหลดข้อมูลรายวิชา...</p>
        </div>

        <div class="stats-row anim-2">
            <div class="stat-card">
                <div class="stat-icon">📖</div>
                <div class="stat-info">
                    <div class="stat-label">บทเรียนทั้งหมด</div>
                    <div class="stat-value" id="statLessons">–</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🎬</div>
                <div class="stat-info">
                    <div class="stat-label">มีลิงก์วิดีโอ</div>
                    <div class="stat-value green" id="statVideos">–</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📝</div>
                <div class="stat-info">
                    <div class="stat-label">มีแบบทดสอบ</div>
                    <div class="stat-value accent" id="statQuizzes">–</div>
                </div>
            </div>
        </div>

        <div class="section-header anim-3">
            <h2 class="section-title">รายการบทเรียน</h2>
            <div style="display:flex;gap:var(--space-2);">
                <button class="btn btn-secondary" id="btnManageStudents">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                        <circle cx="6" cy="5" r="2.5" stroke="currentColor" stroke-width="1.5" />
                        <path d="M1 13c0-2.5 2-4 5-4s5 1.5 5 4" stroke="currentColor" stroke-width="1.5"
                            stroke-linecap="round" />
                        <path d="M11 7l2 2 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                    นักศึกษา
                </button>
                <button class="btn btn-primary" id="btnAddLesson">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                        <path d="M8 2V14M2 8H14" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                    เพิ่มบทเรียน
                </button>
            </div>
        </div>

        <div class="table-wrap anim-4" id="lessonWrap">
            <div
                style="display:flex;align-items:center;justify-content:center;gap:var(--space-2);padding:var(--space-12);color:var(--text-2);font-size:var(--text-sm);">
                <span class="spinner"></span> กำลังโหลดบทเรียน...
            </div>
        </div>

    </main>

    <!-- ─── CREATE / EDIT MODAL ─── -->
    <div class="modal-overlay" id="lessonModal">
        <div class="modal modal-lg">
            <div class="modal-title" id="lessonModalTitle">➕ เพิ่มบทเรียนใหม่</div>

            <div class="form-group">
                <label class="form-label required">ชื่อบทเรียน</label>
                <input type="text" id="inputTitle" class="form-input" placeholder="เช่น บทที่ 1: แนะนำ Python">
            </div>

            <div class="form-group">
                <label class="form-label">รายละเอียด</label>
                <textarea id="inputDesc" class="form-textarea" rows="3"
                    placeholder="อธิบายเนื้อหาของบทเรียนนี้..."></textarea>
            </div>

            <div class="form-section">
                <div class="form-section-title">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                        <path d="M8 2a6 6 0 100 12A6 6 0 008 2z" stroke="currentColor" stroke-width="1.4" />
                        <path d="M6 8l2-1.5V9.5L6 8z" fill="currentColor" />
                    </svg>
                    ลิงก์ประกอบการเรียน (ไม่บังคับ)
                </div>

                <div class="form-group">
                    <label class="form-label">🎬 ลิงก์วิดีโอ</label>
                    <div class="input-with-icon">
                        <span class="link-icon">
                            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                                <path d="M2 4h12v8H2z" stroke="currentColor" stroke-width="1.4"
                                    stroke-linejoin="round" />
                                <path d="M6.5 6.5l3 1.5-3 1.5V6.5z" fill="currentColor" />
                            </svg>
                        </span>
                        <input type="url" id="inputVideo" class="form-input"
                            placeholder="https://youtube.com/watch?v=...">
                    </div>
                </div>

                <div class="link-grid">
                    <div class="form-group" style="margin-bottom:0;">
                        <label class="form-label">📄 ลิงก์เอกสาร</label>
                        <div class="input-with-icon">
                            <span class="link-icon">
                                <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                                    <path d="M4 2h6l4 4v8H4V2z" stroke="currentColor" stroke-width="1.4"
                                        stroke-linejoin="round" />
                                    <path d="M10 2v4h4" stroke="currentColor" stroke-width="1.4"
                                        stroke-linecap="round" />
                                </svg>
                            </span>
                            <input type="url" id="inputDoc" class="form-input"
                                placeholder="https://drive.google.com/...">
                        </div>
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                        <label class="form-label">📝 ลิงก์แบบทดสอบ</label>
                        <div class="input-with-icon">
                            <span class="link-icon">
                                <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                                    <path d="M3 4h10M3 8h7M3 12h5" stroke="currentColor" stroke-width="1.4"
                                        stroke-linecap="round" />
                                </svg>
                            </span>
                            <input type="url" id="inputQuiz" class="form-input"
                                placeholder="https://forms.google.com/...">
                        </div>
                    </div>
                </div>
            </div>

            <div class="modal-actions">
                <button class="btn-cancel" id="btnCancelLesson">ยกเลิก</button>
                <button class="btn-save" id="btnSaveLesson">บันทึก</button>
            </div>
        </div>
    </div>

    <!-- ─── CONFIRM DELETE MODAL ─── -->
    <div class="modal-overlay" id="confirmDeleteModal">
        <div class="modal modal-sm">
            <div class="modal-title">🗑️ ยืนยันการลบบทเรียน</div>
            <p class="confirm-text">
                คุณต้องการลบบทเรียน<br>
                <span class="confirm-course-name" id="confirmLessonName"></span><br>
                ใช่หรือไม่? ข้อมูลการเรียนของนักศึกษาจะถูกลบด้วย
            </p>
            <div class="modal-actions">
                <button class="btn-cancel" id="btnCancelDelete">ยกเลิก</button>
                <button class="btn-confirm-delete" id="btnConfirmDelete">ลบบทเรียน</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="index.js"></script>

</body>

</html>
