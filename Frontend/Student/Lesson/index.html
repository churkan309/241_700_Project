<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บทเรียน - Online Course</title>
    <link rel="stylesheet" href="../../../style.css">
    <style>
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            color: var(--text-2);
            font-size: var(--text-sm);
            background: none;
            border: none;
            cursor: pointer;
            font-family: var(--font-body);
            padding: 0;
            margin-bottom: var(--space-6);
            transition: color var(--transition);
        }

        .back-btn:hover {
            color: var(--accent);
        }

        .course-hero {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: var(--space-6) var(--space-8);
            margin-bottom: var(--space-6);
            animation: fadeUp .5s .1s ease both;
        }

        .course-hero-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: var(--space-4);
            margin-bottom: var(--space-5);
        }

        .course-hero-title {
            font-family: var(--font-display);
            font-size: var(--text-2xl);
            font-weight: 600;
            color: var(--text-1);
            line-height: var(--leading-tight);
        }

        .course-hero-desc {
            color: var(--text-2);
            font-size: var(--text-sm);
            margin-top: var(--space-1);
        }

        .progress-summary {
            text-align: right;
            flex-shrink: 0;
        }

        .progress-big-pct {
            font-family: var(--font-display);
            font-size: var(--text-3xl);
            font-weight: 700;
            line-height: 1;
        }

        .progress-big-pct.done {
            color: var(--green);
        }

        .progress-big-pct.half {
            color: var(--accent);
        }

        .progress-big-pct.low {
            color: var(--orange);
        }

        .progress-sub {
            font-size: var(--text-xs);
            color: var(--text-2);
            margin-top: 4px;
        }

        .progress-wrap-lg {
            height: 8px;
            border-radius: var(--radius-full);
            background: var(--bg-hover);
            overflow: hidden;
        }

        .progress-bar-lg {
            height: 100%;
            border-radius: var(--radius-full);
            transition: width .6s ease;
        }

        /* ── Layout ── */
        .lesson-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: var(--space-5);
            align-items: start;
        }

        /* ── Sidebar list ── */
        .lesson-sidebar {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            position: sticky;
            top: 76px;
            animation: fadeUp .5s .2s ease both;
        }

        .sidebar-header {
            padding: var(--space-4) var(--space-5);
            border-bottom: 1px solid var(--border);
            background: var(--bg-hover);
            font-size: var(--text-xs);
            font-weight: 600;
            color: var(--text-2);
            text-transform: uppercase;
            letter-spacing: .07em;
        }

        .lesson-sidebar-list {
            max-height: calc(100vh - 200px);
            overflow-y: auto;
        }

        .lesson-nav-item {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-3) var(--space-4);
            cursor: pointer;
            transition: background var(--transition);
            border-bottom: 1px solid var(--border);
            border-left: 3px solid transparent;
        }

        .lesson-nav-item:last-child {
            border-bottom: none;
        }

        .lesson-nav-item:hover {
            background: var(--bg-hover);
        }

        .lesson-nav-item.active {
            background: var(--accent-pale);
            border-left-color: var(--accent);
        }

        .lesson-nav-item.completed {
            border-left-color: var(--green);
        }

        .lesson-nav-item.active.completed {
            border-left-color: var(--green);
            background: var(--green-muted);
        }

        .nav-check {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 11px;
            transition: var(--transition);
        }

        .lesson-nav-item.completed .nav-check {
            background: var(--green);
            border-color: var(--green);
            color: #fff;
        }

        .lesson-nav-item.active:not(.completed) .nav-check {
            border-color: var(--accent);
            color: var(--accent);
        }

        .nav-num {
            font-size: var(--text-xs);
            font-weight: 700;
            color: var(--text-3);
        }

        .nav-title {
            flex: 1;
            font-size: var(--text-xs);
            font-weight: 500;
            color: var(--text-2);
            line-height: var(--leading-snug);
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .lesson-nav-item.active .nav-title {
            color: var(--text-1);
            font-weight: 600;
        }

        /* ── Content panel ── */
        .lesson-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            animation: fadeUp .5s .25s ease both;
        }

        .content-header {
            padding: var(--space-6) var(--space-6) var(--space-5);
            border-bottom: 1px solid var(--border);
        }

        .content-lesson-num {
            font-size: var(--text-xs);
            font-weight: 600;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: .07em;
            margin-bottom: var(--space-2);
        }

        .content-lesson-title {
            font-family: var(--font-display);
            font-size: var(--text-xl);
            font-weight: 600;
            color: var(--text-1);
            line-height: var(--leading-snug);
        }

        .content-body {
            padding: var(--space-6);
        }

        .content-desc {
            color: var(--text-2);
            font-size: var(--text-sm);
            line-height: var(--leading-loose);
            margin-bottom: var(--space-6);
        }

        .content-desc:empty {
            display: none;
        }

        /* ── Resource cards ── */
        .resources-title {
            font-size: var(--text-xs);
            font-weight: 600;
            color: var(--text-2);
            text-transform: uppercase;
            letter-spacing: .07em;
            margin-bottom: var(--space-3);
        }

        .resource-list {
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
            margin-bottom: var(--space-6);
        }

        .resource-card {
            display: flex;
            align-items: center;
            gap: var(--space-4);
            padding: var(--space-4);
            background: var(--bg-inset);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            text-decoration: none;
            transition: var(--transition);
        }

        .resource-card:hover {
            border-color: rgba(79, 140, 255, .35);
            background: var(--bg-hover);
            text-decoration: none;
            transform: translateX(3px);
        }

        .resource-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            flex-shrink: 0;
        }

        .resource-icon.video {
            background: rgba(248, 81, 73, .12);
        }

        .resource-icon.doc {
            background: var(--accent-pale);
        }

        .resource-icon.quiz {
            background: var(--orange-muted);
        }

        .resource-info {
            flex: 1;
            min-width: 0;
        }

        .resource-label {
            font-weight: 600;
            font-size: var(--text-sm);
            color: var(--text-1);
        }

        .resource-url {
            font-size: var(--text-xs);
            color: var(--text-2);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-top: 2px;
        }

        .resource-arrow {
            color: var(--text-3);
            flex-shrink: 0;
        }

        .no-resource {
            font-size: var(--text-sm);
            color: var(--text-3);
            text-align: center;
            padding: var(--space-6);
            border: 1px dashed var(--border);
            border-radius: var(--radius);
            margin-bottom: var(--space-6);
        }

        /* ── Footer actions ── */
        .content-footer {
            padding: var(--space-5) var(--space-6);
            border-top: 1px solid var(--border);
            background: var(--bg-hover);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: var(--space-3);
        }

        .nav-btns {
            display: flex;
            gap: var(--space-2);
        }

        .btn-complete {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            padding: 10px 22px;
            border-radius: var(--radius-sm);
            font-family: var(--font-body);
            font-size: var(--text-sm);
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: var(--transition);
            background: var(--green);
            color: var(--text-inverse);
        }

        .btn-complete:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(63, 185, 80, .3);
        }

        .btn-complete:disabled {
            opacity: .5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-complete.done {
            background: var(--green-muted);
            color: var(--green);
            border: 1px solid rgba(63, 185, 80, .3);
            cursor: default;
        }

        .btn-complete.done:hover {
            transform: none;
            box-shadow: none;
            filter: none;
        }

        /* ── Empty / loading ── */
        .panel-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-2);
            padding: var(--space-16);
            color: var(--text-2);
            font-size: var(--text-sm);
        }

        @media (max-width: 860px) {
            .lesson-layout {
                grid-template-columns: 1fr;
            }

            .lesson-sidebar {
                position: static;
            }

            .lesson-sidebar-list {
                max-height: 240px;
            }

            .course-hero {
                padding: var(--space-5);
            }

            .progress-summary {
                display: none;
            }
        }
    </style>
</head>

<body>

    <header class="topbar">
        <a class="logo" href="#">
            <div class="logo-dot"></div>
            OnlineCourse
        </a>
        <div class="topbar-right">
            <button class="btn-profile" id="btnProfile">
                <div class="avatar avatar-sm" id="avatarInitial">ST</div>
                <span id="topbarName">นักศึกษา</span>
            </button>
            <button class="btn-logout" id="btnLogout">ออกจากระบบ</button>
        </div>
    </header>

    <main class="main">

        <button class="back-btn" id="btnBack">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
            กลับแดชบอร์ด
        </button>

        <!-- Course hero -->
        <div class="course-hero" id="courseHero">
            <div class="panel-loading"><span class="spinner"></span> กำลังโหลด...</div>
        </div>

        <!-- Lesson layout -->
        <div class="lesson-layout">

            <!-- Sidebar -->
            <div class="lesson-sidebar">
                <div class="sidebar-header">บทเรียนทั้งหมด</div>
                <div class="lesson-sidebar-list" id="lessonSidebarList">
                    <div class="panel-loading"><span class="spinner"></span></div>
                </div>
            </div>

            <!-- Content -->
            <div class="lesson-content" id="lessonContent">
                <div class="panel-loading" style="min-height:320px;">
                    <span class="spinner"></span> เลือกบทเรียนที่ต้องการ
                </div>
            </div>

        </div>

    </main>

    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="index.js"></script>

</body>

</html>
