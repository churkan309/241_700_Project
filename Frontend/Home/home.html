<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>เข้าสู่ระบบ - CourseFlow</title>
    <link rel="stylesheet" href="../../style.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="home.js"></script>
</head>

<body>
    <div class="container auth-container">
        <h1>เข้าสู่ระบบ</h1>
        <div id="message"></div>
        <div class="input-group">
            <label>ชื่อผู้ใช้งาน (Firstname)</label>
            <input type="text" id="firstname" placeholder="กรอกชื่อของคุณ">
        </div>
        <div class="input-group">
            <label>รหัสผ่าน (Password)</label>
            <input type="password" id="password" placeholder="กรอกรหัสผ่าน">
        </div>
        <button onclick="loginData()">เข้าสู่ระบบ</button>
        <div class="link-text">
            <span>ยังไม่มีบัญชีใช่ไหม? <a href="../Register/register.html">สร้างบัญชีผู้ใช้ใหม่</a></span>
        </div>
    </div>
</body>

</html>
