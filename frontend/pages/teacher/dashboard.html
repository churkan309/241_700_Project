<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - Online Course</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        .stat-value.sm {
            font-size: var(--text-base);
            font-weight: 400;
            margin-top: var(--space-1);
        }

        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: var(--space-4);
        }

        .section-count {
            font-size: var(--text-xs);
            font-weight: 600;
            color: var(--text-2);
            background: var(--bg-hover);
            border: 1px solid var(--border);
            border-radius: var(--radius-full);
            padding: 3px 12px;
        }

        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: var(--space-4);
            padding: var(--space-5);
        }

        .loading-state {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-2);
            padding: var(--space-12);
            color: var(--text-2);
            font-size: var(--text-sm);
        }

        .empty-state {
            grid-column: 1 / -1;
        }

        .btn-delete {
            flex: 1;
            background: var(--red);
            border: none;
            border-radius: var(--radius-sm);
            padding: 10px;
            color: #fff;
            font-family: var(--font-body);
            font-size: var(--text-sm);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-delete:hover {
            filter: brightness(1.1);
        }

        .course-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: var(--space-5);
            display: flex;
            flex-direction: column;
            gap: var(--space-4);
            transition: var(--transition);
        }

        .course-card:hover {
            border-color: rgba(79, 140, 255, 0.35);
            background: var(--bg-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .course-card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
        }

        .course-card-icon {
            width: 40px;
            height: 40px;
            background: var(--accent-pale);
            border: 1px solid rgba(79, 140, 255, 0.2);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .course-card-menu {
            position: relative;
        }

        .course-card-body {
            flex: 1;
        }

        .course-card-title {
            font-family: var(--font-display);
            font-size: var(--text-md);
            font-weight: 600;
            color: var(--text-1);
            margin-bottom: var(--space-2);
            line-height: var(--leading-snug);
        }

        .course-card-desc {
            font-size: var(--text-sm);
            color: var(--text-2);
            line-height: var(--leading-normal);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .course-card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-3);
            padding-top: var(--space-3);
            border-top: 1px solid var(--border);
        }
    </style>
</head>

<body>

    <header class="topbar">
        <a class="logo" href="#">
            <div class="logo-dot"></div>
            OnlineCourse
        </a>
        <div class="topbar-right">
            <button class="btn-profile" id="btnProfile">
                <div class="avatar avatar-sm" id="avatarInitial">TC</div>
                <span id="topbarName">อาจารย์</span>
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                    <path d="M2 4L6 8L10 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                </svg>
            </button>
            <button class="btn-logout" id="btnLogout">ออกจากระบบ</button>
        </div>
    </header>

    <main class="main">

        <div class="hero anim-1">
            <div class="hero-text">
                <p class="hero-greeting">ยินดีต้อนรับกลับมา 👋</p>
                <h1 class="hero-name">สวัสดี, <span id="heroName">กำลังโหลด...</span></h1>
            </div>
            <button class="btn btn-primary" id="btnCreate">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                    <path d="M8 2V14M2 8H14" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
                สร้างรายวิชาใหม่
            </button>
        </div>

        <div class="stats-row anim-2">
            <div class="stat-card">
                <div class="stat-icon">📚</div>
                <div class="stat-info">
                    <div class="stat-label">รายวิชาทั้งหมด</div>
                    <div class="stat-value" id="statCourses">–</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🆔</div>
                <div class="stat-info">
                    <div class="stat-label">รหัสอาจารย์</div>
                    <div class="stat-value" id="statId">–</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📧</div>
                <div class="stat-info">
                    <div class="stat-label">อีเมล</div>
                    <div class="stat-value sm" id="statEmail">–</div>
                </div>
            </div>
        </div>

        <div class="section-header anim-3">
            <h2 class="section-title">รายวิชาของฉัน</h2>
            <span class="section-count" id="sectionCount">0 วิชา</span>
        </div>

        <div class="table-wrap anim-4">
            <div class="course-grid" id="courseGrid">
                <div class="loading-state">
                    <span class="spinner"></span> กำลังโหลดรายวิชา...
                </div>
            </div>
        </div>

    </main>

    <div class="modal-overlay" id="courseModal">
        <div class="modal">
            <div class="modal-title" id="courseModalTitle">➕ สร้างรายวิชาใหม่</div>
            <div class="form-group">
                <label class="form-label required">ชื่อรายวิชา</label>
                <input type="text" id="inputCourseTitle" class="form-input" placeholder="เช่น Introduction to Python">
            </div>
            <div class="form-group">
                <label class="form-label">คำอธิบายรายวิชา</label>
                <textarea id="inputCourseDesc" class="form-textarea" rows="3"
                    placeholder="อธิบายเนื้อหาของรายวิชาโดยย่อ..."></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" id="btnCancelCourse">ยกเลิก</button>
                <button class="btn-save" id="btnSaveCourse">บันทึก</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="profileModal">
        <div class="modal">
            <div class="modal-title">⚙️ จัดการโปรไฟล์</div>
            <div class="form-group">
                <label class="form-label">ชื่อ</label>
                <input type="text" id="inputFirstname" class="form-input" placeholder="ชื่อ">
            </div>
            <div class="form-group">
                <label class="form-label">นามสกุล</label>
                <input type="text" id="inputLastname" class="form-input" placeholder="นามสกุล">
            </div>
            <div class="form-group">
                <label class="form-label">รหัสผ่านใหม่</label>
                <input type="password" id="inputPassword" class="form-input" placeholder="กรอกรหัสผ่านใหม่">
            </div>
            <div class="form-group">
                <label class="form-label">อีเมล (แก้ไขไม่ได้)</label>
                <input type="text" id="inputEmail" class="form-input" disabled>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" id="btnCancelProfile">ยกเลิก</button>
                <button class="btn-save" id="btnSaveProfile">บันทึก</button>
                <button class="btn-delete" id="btnDeleteAccount">ลบบัญชี</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="confirmDeleteModal">
        <div class="modal">
            <div class="modal-title">⚠️ ยืนยันการลบรายวิชา</div>
            <p class="confirm-text">
                คุณต้องการลบรายวิชา<br>
                <span class="confirm-course-name" id="confirmDeleteName"></span><br>
                ใช่หรือไม่? บทเรียนและข้อมูลนักศึกษาทั้งหมดจะถูกลบด้วย
            </p>
            <div class="modal-actions">
                <button class="btn-cancel" id="btnCancelDelete">ยกเลิก</button>
                <button class="btn-delete" id="btnConfirmDelete">ลบรายวิชา</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../../assets/js/utils.js"></script>
    <script src="dashboard.js"></script>

</body>

</html>
