<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการนักศึกษา - Online Course</title>
    <link rel="stylesheet" href="../../../style.css">
    <style>
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            color: var(--text-2);
            font-size: var(--text-sm);
            background: none;
            border: none;
            cursor: pointer;
            font-family: var(--font-body);
            padding: 0;
            margin-bottom: var(--space-6);
            transition: color var(--transition);
        }
        .back-btn:hover { color: var(--accent); }

        .course-meta {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            margin-bottom: var(--space-2);
        }

        .student-row {
            display: grid;
            grid-template-columns: 44px 1fr 160px 120px;
            align-items: center;
            gap: var(--space-4);
            padding: var(--space-4) var(--space-5);
            border-bottom: 1px solid var(--border);
            transition: background var(--transition);
            animation: rowIn .3s ease both;
        }
        .student-row:last-child { border-bottom: none; }
        .student-row:hover { background: var(--bg-hover); }

        .student-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), var(--purple));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--text-xs);
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }

        .student-info { min-width: 0; }
        .student-name {
            font-weight: 600;
            color: var(--text-1);
            font-size: var(--text-sm);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .student-email {
            font-size: var(--text-xs);
            color: var(--text-2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .progress-col { min-width: 0; }
        .progress-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--space-1);
        }
        .progress-label {
            font-size: var(--text-xs);
            color: var(--text-2);
        }
        .progress-pct {
            font-size: var(--text-xs);
            font-weight: 600;
            color: var(--text-1);
        }
        .progress-pct.done { color: var(--green); }

        .action-col {
            display: flex;
            justify-content: flex-end;
        }

        .table-head-row {
            display: grid;
            grid-template-columns: 44px 1fr 160px 120px;
            gap: var(--space-4);
            padding: 10px var(--space-5);
            background: var(--bg-hover);
            border-bottom: 1px solid var(--border);
        }
        .table-head-row span {
            font-size: var(--text-xs);
            text-transform: uppercase;
            letter-spacing: .07em;
            color: var(--text-2);
            font-weight: 600;
        }
        .table-head-row .th-action {
            text-align: right;
        }

        .btn-confirm-delete {
            flex: 1;
            background: var(--red);
            border: none;
            border-radius: var(--radius-sm);
            padding: 10px;
            color: #fff;
            font-family: var(--font-body);
            font-size: var(--text-sm);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-confirm-delete:hover { filter: brightness(1.1); }

        @media (max-width: 640px) {
            .student-row       { grid-template-columns: 36px 1fr auto; }
            .table-head-row    { grid-template-columns: 36px 1fr auto; }
            .progress-col      { display: none; }
            .table-head-row .th-progress { display: none; }
        }
    </style>
</head>

<body>

    <header class="topbar">
        <a class="logo" href="#">
            <div class="logo-dot"></div>
            OnlineCourse
        </a>
        <div class="topbar-right">
            <button class="btn-profile" id="btnProfile">
                <div class="avatar avatar-sm" id="avatarInitial">TC</div>
                <span id="topbarName">อาจารย์</span>
            </button>
            <button class="btn-logout" id="btnLogout">ออกจากระบบ</button>
        </div>
    </header>

    <main class="main">

        <button class="back-btn" id="btnBack">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="1.8"
                      stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            กลับหน้าบทเรียน
        </button>

        <div class="page-header anim-1">
            <div class="course-meta">
                <span class="badge badge-blue" id="courseIdBadge">Course ID: –</span>
                <span class="badge badge-gray" id="enrollBadge">0 คน</span>
            </div>
            <h1 class="page-title" id="pageTitle">จัดการนักศึกษา</h1>
            <p class="page-subtitle" id="pageSubtitle">กำลังโหลด...</p>
        </div>

        <div class="stats-row anim-2">
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-info">
                    <div class="stat-label">นักศึกษาทั้งหมด</div>
                    <div class="stat-value" id="statTotal">–</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-info">
                    <div class="stat-label">เรียนครบ 100%</div>
                    <div class="stat-value green" id="statDone">–</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-info">
                    <div class="stat-label">ความคืบหน้าเฉลี่ย</div>
                    <div class="stat-value accent" id="statAvg">–</div>
                </div>
            </div>
        </div>

        <div class="section-header anim-3">
            <h2 class="section-title">รายชื่อนักศึกษา</h2>
        </div>

        <div class="table-wrap anim-4" id="studentWrap">
            <div style="display:flex;align-items:center;justify-content:center;
                        gap:var(--space-2);padding:var(--space-12);
                        color:var(--text-2);font-size:var(--text-sm);">
                <span class="spinner"></span> กำลังโหลด...
            </div>
        </div>

    </main>

    <!-- ─── CONFIRM REMOVE MODAL ─── -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal modal-sm">
            <div class="modal-title">⚠️ ยืนยันการลบนักศึกษา</div>
            <p class="confirm-text">
                คุณต้องการลบ<br>
                <span class="confirm-course-name" id="confirmStudentName"></span><br>
                ออกจากรายวิชานี้ใช่หรือไม่?
                ข้อมูลความคืบหน้าจะถูกลบด้วย
            </p>
            <div class="modal-actions">
                <button class="btn-cancel" id="btnCancelRemove">ยกเลิก</button>
                <button class="btn-confirm-delete" id="btnConfirmRemove">ลบออกจากรายวิชา</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="index.js"></script>

</body>

</html>
