<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - Online Course</title>
    <link rel="stylesheet" href="../../../style.css">
    <style>
        .auth-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-4);
        }

        .auth-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: var(--space-8);
            width: 100%;
            max-width: 400px;
        }

        .auth-card h2 {
            font-family: var(--font-display);
            font-size: var(--text-2xl);
            font-weight: 600;
            color: var(--text-1);
            margin-bottom: var(--space-2);
        }

        .auth-card .subtitle {
            color: var(--text-2);
            font-size: var(--text-sm);
            margin-bottom: var(--space-6);
        }

        .auth-card .form-group {
            margin-bottom: var(--space-4);
        }

        .btn-submit {
            width: 100%;
            background: var(--accent);
            border: none;
            border-radius: var(--radius-sm);
            padding: 11px;
            color: var(--text-inverse);
            font-family: var(--font-body);
            font-size: var(--text-md);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: var(--space-5);
        }
        .btn-submit:hover {
            background: #7aaaff;
            transform: translateY(-1px);
            box-shadow: var(--shadow-accent);
        }

        .footer-link {
            text-align: center;
            font-size: var(--text-sm);
            color: var(--text-2);
        }
        .footer-link a {
            color: var(--accent);
            font-weight: 500;
        }
        .footer-link a:hover {
            color: var(--text-link-hover);
        }
    </style>
</head>

<body>

    <div class="auth-wrap">
        <div class="auth-card">
            <h2>เข้าสู่ระบบ</h2>
            <p class="subtitle">กรอกอีเมลและรหัสผ่านเพื่อเข้าเรียน</p>

            <form>
                <div class="form-group">
                    <input class="form-input" type="email" placeholder="อีเมล" required>
                </div>
                <div class="form-group" style="margin-bottom: var(--space-6);">
                    <input class="form-input" type="password" placeholder="รหัสผ่าน" required>
                </div>

                <button type="submit" class="btn-submit">เข้าสู่ระบบ</button>
            </form>

            <div class="footer-link">
                ยังไม่มีบัญชีใช่ไหม? <a href="../Register/index.html">สมัครสมาชิก</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="index.js"></script>
</body>

</html>
