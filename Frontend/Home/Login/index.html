<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - Online Course</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

    <div class="auth-container">
        <div class="auth-card">
            <h2>เข้าสู่ระบบ</h2>
            <p class="subtitle">กรอกอีเมลและรหัสผ่านเพื่อเข้าเรียน</p>

            <form>
                <div class="input-group">
                    <input type="email" placeholder="อีเมล" required>
                </div>
                <div class="input-group" style="margin-bottom: 24px;">
                    <input type="password" placeholder="รหัสผ่าน" required>
                </div>

                <button type="submit" class="btn-submit">เข้าสู่ระบบ</button>
            </form>

            <div class="footer-link">
                ยังไม่มีบัญชีใช่ไหม? <a href="../Register/index.html">สมัครสมาชิก</a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="index.js"></script>
</body>

</html>
